<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика Семпай | Обучение умножению</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">

        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="screen-home" class="screen active">
            <div class="header-decor">✨ 🌸 ✨</div>
            <div class="mascot">🎀</div>
            <h1 class="title">Математика Семпай!</h1>
            <p class="subtitle">Путь героя таблицы умножения</p>

            <div class="stats-box">
                <div class="stat">
                    <span class="stat-val" id="stat-total">0</span>
                    <span class="stat-label">Примеров</span>
                </div>
                <div class="stat">
                    <span class="stat-val" id="stat-accuracy">0%</span>
                    <span class="stat-label">Точность</span>
                </div>
                <div class="stat">
                    <span class="stat-val" id="stat-week">1</span>
                    <span class="stat-label">Неделя</span>
                </div>
            </div>

            <button class="btn-main" onclick="app.nav('screen-map')">🗺️ Карта Приключения</button>
            <button class="btn-sec" onclick="app.nav('screen-practice')">⚔️ Тренировка</button>
            <button class="btn-sec" onclick="app.nav('screen-achievements')">🏆 Достижения</button>
        </div>

        <!-- КАРТА УРОВНЕЙ (НЕДЕЛИ) -->
        <div id="screen-map" class="screen">
            <div class="nav-bar">
                <button class="btn-back" onclick="app.nav('screen-home')">⬅ Домой</button>
                <h2>Карта Обучения</h2>
            </div>
            <div id="weeks-container" class="weeks-list">
                <!-- Генерируется через JS -->
            </div>
        </div>

        <!-- ЭКРАН УРОКА -->
        <div id="screen-lesson" class="screen">
            <div class="nav-bar">
                <button class="btn-back" onclick="app.nav('screen-map')">⬅ Карта</button>
                <h2 id="lesson-title">Урок 1</h2>
                <div class="streak">🔥 <span id="streak-val">0</span></div>
            </div>

            <div class="lesson-area">
                <!-- Блок стратегии -->
                <div class="strategy-box">
                    <h4>💡 Секретный приём</h4>
                    <p id="strategy-text">Загрузка...</p>
                </div>

                <!-- Визуализация -->
                <div class="visual-stage">
                    <div class="visual-controls">
                        <button onclick="app.setVisual('array')">📊 Массив</button>
                        <button onclick="app.setVisual('line')">📏 Линия</button>
                        <button onclick="app.setVisual('fingers')">👐 Пальцы</button>
                    </div>
                    <div id="visual-container"></div>
                    <p id="visual-desc"></p>
                </div>

                <!-- Задача -->
                <div class="task-box">
                    <div class="equation">
                        <span id="q-n1">2</span> × <span id="q-n2">3</span> = <input type="number" id="answer-input" autocomplete="off">
                    </div>
                    <div class="controls">
                        <button class="btn-main" onclick="app.check()">Ответить</button>
                        <button class="btn-hint" onclick="app.showHint()">💡 Подсказка</button>
                    </div>
                    <div id="feedback" class="feedback"></div>
                    <div id="hint-display" class="hint-display"></div>
                </div>
            </div>

            <div class="lesson-progress">
                <div class="bar"><div id="lesson-bar" class="fill"></div></div>
                <span id="lesson-progress-text">1 / 10</span>
            </div>
        </div>

        <!-- ЭКРАН ПРАКТИКИ -->
        <div id="screen-practice" class="screen">
            <div class="nav-bar">
                <button class="btn-back" onclick="app.nav('screen-home')">⬅ Домой</button>
                <h2>Тренировка</h2>
            </div>
            <div class="modes-grid">
                <div class="mode-card" onclick="app.startPractice('flash')">
                    <div class="icon">🃏</div>
                    <h3>Карточки</h3>
                    <p>Быстрый повтор</p>
                </div>
                <div class="mode-card" onclick="app.startPractice('time')">
                    <div class="icon">⏱️</div>
                    <h3>На время</h3>
                    <p>60 секунд на максимум</p>
                </div>
                <div class="mode-card" onclick="app.startPractice('boss')">
                    <div class="icon">👹</div>
                    <h3>Босс</h3>
                    <p>10 примеров без ошибок</p>
                </div>
            </div>
        </div>

        <!-- ЭКРАН ДОСТИЖЕНИЙ -->
        <div id="screen-achievements" class="screen">
            <div class="nav-bar">
                <button class="btn-back" onclick="app.nav('screen-home')">⬅ Домой</button>
                <h2>Зал Славы</h2>
            </div>
            <div id="achievements-list" class="ach-list"></div>
        </div>

    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
